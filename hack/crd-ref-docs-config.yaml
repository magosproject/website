processor:
  # Hide the auto-generated *List wrapper types and the embedded Kubernetes
  # ObjectMeta. They add no value to operators reading the reference.
  ignoreTypes:
    - "(Project|Workspace|Rollout|VariableSet)List$"
  ignoreFields:
    - "status$"
    - "TypeMeta$"

render:
  # Make Kubernetes-native types link to upstream docs instead of being
  # rendered as opaque type names.
  kubernetesVersion: 1.28
  knownTypes:
    - name: Condition
      package: k8s.io/apimachinery/pkg/apis/meta/v1
      link: https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.28/#condition-v1-meta
    - name: LabelSelector
      package: k8s.io/apimachinery/pkg/apis/meta/v1
      link: https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.28/#labelselector-v1-meta
    - name: ObjectMeta
      package: k8s.io/apimachinery/pkg/apis/meta/v1
      link: https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.28/#objectmeta-v1-meta
    - name: Time
      package: k8s.io/apimachinery/pkg/apis/meta/v1
      link: https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.28/#time-v1-meta
